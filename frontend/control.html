<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wizard — Control</title>
  </head>
  <body>
    <div id="app">
      <header class="control-header">
        <h1>Wizard</h1>
        <div class="status-pill" id="status-pill">
          <span class="status-dot"></span>
          <span id="status-text">Offline</span>
        </div>
      </header>

      <div class="webcam-stage">
        <video id="webcam" autoplay muted playsinline></video>
        <div class="pip-container" id="pip-container">
          <video id="display-cam" autoplay playsinline></video>
          <div class="pip-label">Display</div>
        </div>
      </div>

      <div class="stream-toggle">
        <button id="start">Begin Streaming</button>
        <button id="stop" class="hidden">Stop Streaming</button>
      </div>

      <section class="soundboard">
        <div class="soundboard-label">Soundboard</div>
        <div id="sound-buttons"></div>
      </section>
    </div>
    <script type="module" src="/src/control.ts"></script>
  </body>
</html>
